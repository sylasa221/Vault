<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --bg: #050505; --card: #0c0c0c; --accent: #3b82f6; --text: #ffffff; --border: #151515; }
        * { -ms-overflow-style: none; scrollbar-width: none; outline: none !important; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 60px; overflow-y: auto; user-select: none; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        #searchInput { width: 350px; padding: 10px 25px; border-radius: 25px; background: #111; border: 1px solid #1a1a1a; color: #fff; font-size: 0.7rem; letter-spacing: 1px; }

        /* Custom Context Menu */
        #contextMenu { display: none; position: fixed; background: #0c0c0c; border: 1px solid #1a1a1a; z-index: 20000; width: 160px; padding: 5px 0; border-radius: 4px; transform: translate(-50%, -50%); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .menu-item { padding: 12px; font-size: 0.65rem; color: var(--accent); cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; font-weight: bold; }
        .menu-item:hover { opacity: 0.6; }

        /* Import Wizard */
        #importPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 30000; align-items: center; justify-content: center; }
        .wizard-card { background: #0c0c0c; border: 1px solid #222; padding: 40px; border-radius: 8px; width: 450px; text-align: center; }
        .progress-container { width: 100%; background: #111; height: 6px; margin: 25px 0; border-radius: 3px; overflow: hidden; display: none; }
        #progressBar { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }

        /* Video Overlay */
        #videoOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10000; flex-direction: column; align-items: center; 
            justify-content: center; overflow: hidden; border: none !important; outline: none !important; 
        }
        
        .player-controls { position: absolute; top: 30px; right: 40px; display: flex; gap: 20px; z-index: 10001; transition: opacity 0.4s ease, transform 0.4s ease; }
        
        /* Auto-Hide Logic */
        #videoOverlay.idle { cursor: none; }
        #videoOverlay.idle .player-controls { opacity: 0; transform: translateY(-10px); pointer-events: none; }
        #videoOverlay.idle video::-webkit-media-controls-panel { opacity: 0 !important; transition: opacity 0.4s ease; }

        /* Video Styling & Outline Removal */
        video { 
            width: 100%; height: 100%; background: #000; 
            outline: none !important; border: none !important; 
            box-shadow: none !important;
        }
        video::-webkit-media-controls-panel { background-image: linear-gradient(transparent, rgba(0,0,0,0.8)) !important; display: flex !important; opacity: 1; transition: opacity 0.2s ease; }
        video::-webkit-media-controls-play-button, video::-webkit-media-controls-volume-control-container { filter: brightness(1.5); }
        video::-webkit-media-controls-timeline { display: none !important; }
        video::-webkit-media-controls-start-playback-button { display: none !important; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding-bottom: 100px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #252525; transform: translateY(-2px); }
        .card-thumb { aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-btn { color: #888; background: rgba(20,20,20,0.8); border: 1px solid #333; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        .p-btn:hover { color: #fff; border-color: var(--accent); }
        .blue-btn { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body onclick="hideMenu()" oncontextmenu="return false;">

<div class="header">
    <h1 style="letter-spacing: 10px; font-size: 0.8rem; color: #444; margin: 0;">VAULT</h1>
    <input type="text" id="searchInput" placeholder="SEARCH LIBRARY..." oninput="filterLibrary()">
    <button class="p-btn" onclick="window.pywebview.api.open_folder_dialog()">IMPORT WIZARD</button>
</div>

<div id="contextMenu"><div class="menu-item" onclick="triggerThumb()">Set Thumbnail</div></div>

<div id="importPanel">
    <div class="wizard-card">
        <div id="wizardStatus" style="font-size: 0.7rem; color: #444; letter-spacing: 2px;">SCAN COMPLETE</div>
        <div id="currentFileName" style="font-size: 0.8rem; color: var(--accent); margin: 15px 0;">READY</div>
        <div class="progress-container" id="progCont"><div id="progressBar"></div></div>
        <div id="wizardActions" style="display:none">
            <button class="p-btn blue-btn" onclick="startImportProcess()">IMPORT</button>
            <button class="p-btn" style="margin-left:10px" onclick="closeWizard()">CANCEL</button>
        </div>
    </div>
</div>

<div id="videoOverlay" onmousemove="handleActivity()">
    <div class="player-controls">
        <button class="p-btn" onclick="player.requestPictureInPicture()">PIP</button>
        <button class="p-btn" onclick="closePlayer()">CLOSE</button>
    </div>
    <video id="mainPlayer" controls controlsList="nodownload noplaybackrate"></video>
</div>

<div class="grid" id="mainGrid"></div>

<script>
    const player = document.getElementById('mainPlayer');
    const overlay = document.getElementById('videoOverlay');
    let allVideos = [], pendingFiles = [], menuTarget = null, idleTimer;

    function handleActivity() {
        overlay.classList.remove('idle');
        clearTimeout(idleTimer);
        if (!player.paused && overlay.style.display === 'flex') {
            idleTimer = setTimeout(() => {
                overlay.classList.add('idle');
            }, 3000);
        }
    }

    function showMenu(e, video) {
        e.preventDefault(); e.stopPropagation();
        menuTarget = video;
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
    }
    function hideMenu() { document.getElementById('contextMenu').style.display = 'none'; }
    function triggerThumb() { 
        if (menuTarget) window.pywebview.api.set_thumbnail(menuTarget.filename); 
        hideMenu(); 
    }

    function showImportPanel(files) {
        pendingFiles = files;
        document.getElementById('importPanel').style.display = 'flex';
        document.getElementById('currentFileName').innerText = `FOUND ${files.length} MP4 FILES`;
        document.getElementById('progCont').style.display = 'none';
        document.getElementById('wizardActions').style.display = 'block';
    }
    function startImportProcess() {
        document.getElementById('wizardActions').style.display = 'none';
        document.getElementById('progCont').style.display = 'block';
        window.pywebview.api.import_files(pendingFiles);
    }
    function updateProgress(curr, tot, name) {
        document.getElementById('progressBar').style.width = (curr/tot*100) + '%';
        document.getElementById('currentFileName').innerText = name;
    }
    function finishImport() {
        document.getElementById('currentFileName').innerText = "COMPLETE";
        setTimeout(() => { closeWizard(); loadLibrary(); }, 1500);
    }
    function closeWizard() { document.getElementById('importPanel').style.display = 'none'; }

    async function loadLibrary() {
        const res = await fetch('/api/videos');
        allVideos = await res.json();
        renderGrid(allVideos);
    }

    function renderGrid(videos) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        videos.forEach(v => {
            const card = document.createElement('div');
            card.className = 'card';
            card.oncontextmenu = (e) => showMenu(e, v);
            card.onclick = () => {
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden'; 
                player.src = `/video/${encodeURIComponent(v.filename)}`;
                player.currentTime = v.last_pos || 0;
                player.play();
                handleActivity();
            };
            const thumb = v.thumbnail ? `<img src="${v.thumbnail}">` : `<span style="color:#222;font-size:2rem">▶</span>`;
            card.innerHTML = `<div class="card-thumb">${thumb}</div><div style="padding:15px; font-size:0.65rem; color:#444; letter-spacing:1px;">${v.display_name.toUpperCase()}</div>`;
            grid.appendChild(card);
        });
    }

    function filterLibrary() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderGrid(allVideos.filter(v => v.display_name.toLowerCase().includes(term)));
    }

    function closePlayer() {
        fetch('/api/save_pos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({filename: player.src.split('/').pop(), pos: player.currentTime})
        });
        player.pause();
        overlay.style.display = 'none';
        overlay.classList.remove('idle');
        document.body.style.overflow = 'auto'; 
        loadLibrary();
    }

    window.addEventListener('wheel', (e) => {
        if (overlay.style.display === 'flex') {
            e.preventDefault();
            player.currentTime += (e.deltaY < 0 ? 10 : -10);
            handleActivity();
        }
    }, { passive: false });

    document.addEventListener('keydown', (e) => {
        if (overlay.style.display === 'flex') {
            handleActivity();
            if (e.key.toLowerCase() === 'x') closePlayer();
            if (e.key.toLowerCase() === 'f') window.pywebview.api.toggle_fs();
            if (e.key === ' ') { e.preventDefault(); player.paused ? player.play() : player.pause(); }
        }
    });

    loadLibrary();
</script>
</body>
</html>
